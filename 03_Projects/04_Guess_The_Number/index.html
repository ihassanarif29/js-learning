<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess The Number</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="wrapper">
      <h1>Number Guessing Game</h1>
      <p>
        t=Try to guess a random number between 1 and 100. You have 10 attempts
        to guess the right number.
      </p>
      <form action="" class="form">
        <label2 id="guess" for="guessField">Guess a Number</label2>
        <input type="text" id="guessField" class="guessField" />
        <input
          type="submit"
          id="submit"
          value="Submit guess"
          class="guessSubmit"
        />
      </form>
      <div class="resultParas">
        <p>Previous Guess: <span class="guesses"></span></p>
        <p>Guesses Remaining: <span class="lastResult">10</span></p>
        <p class="lowOrHi"></p>
      </div>
    </div>
  </body>
  <script src="guess_the_number.js"></script>
</html>
